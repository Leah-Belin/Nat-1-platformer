<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nat 1 Platformer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="800" height="600"></canvas>

    <!-- Touch controls (shown only on touch devices via JS) -->
    <div id="touch-ui">
      <div id="dpad">
        <button class="tbtn" id="tbtn-up">▲</button>
        <div class="dpad-row">
          <button class="tbtn" id="tbtn-left">◀</button>
          <button class="tbtn" id="tbtn-down">▼</button>
          <button class="tbtn" id="tbtn-right">▶</button>
        </div>
      </div>
      <div id="action-pad">
        <button class="tbtn tbtn-jump" id="tbtn-jump">JUMP</button>
      </div>
    </div>
  </div>
  <script src="state.js"></script>
  <script src="characters.js"></script>
  <script src="level.js"></script>
  <script src="input.js"></script>
  <script src="renderer.js"></script>
  <script src="engine.js"></script>
</body>
</html>
